<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teknik Blog | Rulman Satış</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --blue: #004a99; --dark: #0f172a; --neon: #39FF14; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: #f8fafc; }

        /* NAVBAR */
        header { 
            background: white; padding: 15px 5%; display: flex; 
            justify-content: space-between; align-items: center; 
            box-shadow: 0 2px 15px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; 
        }
        .logo { font-family: 'Montserrat'; font-weight: 900; font-size: 1.5rem; color: var(--blue); text-decoration: none; }
        .nav-menu { display: flex; list-style: none; gap: 20px; margin: 0; }
        .nav-menu a { text-decoration: none; color: var(--dark); font-weight: 600; font-size: 0.8rem; text-transform: uppercase; }

        /* HEADER */
        .blog-hero { background: var(--dark); color: white; padding: 60px 5%; text-align: center; }
        .blog-hero h1 { font-family: 'Montserrat'; font-size: 2.2rem; margin: 0; }

        /* GRID */
        .blog-grid { 
            max-width: 1200px; margin: 40px auto; padding: 0 5%; 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; 
        }

        /* YAZI KARTI */
        .post-card { 
            background: white; border-radius: 15px; overflow: hidden; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-decoration: none; 
            color: inherit; transition: 0.3s; border: 1px solid #eee; display: flex; flex-direction: column;
        }
        .post-card:hover { transform: translateY(-5px); border-color: var(--neon); }
        .post-card img { width: 100%; height: 200px; object-fit: cover; }
        .post-content { padding: 20px; }
        .post-content h3 { font-family: 'Montserrat'; margin: 0 0 10px 0; color: var(--blue); font-size: 1.2rem; }
        .post-content p { font-size: 0.9rem; color: #64748b; line-height: 1.5; }

        @media (max-width: 768px) { .nav-menu { display: none; } }
    </style>
</head>
<body>

    <header>
        <a href="../index.html" class="logo">RULMAN SATIŞ</a>
        <nav>
            <ul class="nav-menu">
                <li><a href="../index.html">Anasayfa</a></li>
                <li><a href="hakkimizda.html">Hakkımızda</a></li>
                <li><a href="urunler.html">Ürünler</a></li>
                <li><a href="blog.html" style="color:var(--blue)">Blog</a></li>
                <li><a href="iletisim.html">İletişim</a></li>
            </ul>
        </nav>
    </header>

    <div class="blog-hero">
        <h1>Teknik Makaleler</h1>
        <p>Mühendislik notları ve rulman dünyasından haberler.</p>
    </div>
    <main class="blog-grid">
    <a href="blog/tarim-rulman-tercihi.html" class="post-card">
        <img src="../1764430018088.jpg" alt="Tarım Rulmanları">
        <div class="post-content">
            <span style="font-size: 0.75rem; font-weight: bold; color: var(--blue);">SEKTÖREL ANALİZ</span>
            <h3>Tarım Sektöründe Rulman Tercihi</h3>
            <p>Tohumdan hasada, zorlu arazi şartlarında makine ömrünü uzatan kritik seçimler.</p>
            <span style="color:var(--blue); font-weight:bold; font-size:0.8rem;">Devamını Oku →</span>
        </div>
    </a>

    

    <a href="https://wa.me/905050913463" style="position:fixed; bottom:25px; right:25px; background:#25d366; width:60px; height:60px; border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 5px 15px rgba(0,0,0,0.2); z-index:2000;">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="30">
    </a>

</body>
</html>
