<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim | Rulman Satış</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #004a99; --dark: #0f172a; --neon: #39FF14; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: #f8fafc; }
        
        /* NAVBAR */
        header { background: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 15px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Montserrat'; font-weight: 900; font-size: 1.5rem; color: var(--blue); text-decoration: none; }
        .nav-menu { display: flex; list-style: none; gap: 20px; margin: 0; }
        .nav-menu a { text-decoration: none; color: var(--dark); font-weight: 600; font-size: 0.8rem; text-transform: uppercase; }

        .contact-container { max-width: 1100px; margin: 60px auto; padding: 0 5%; display: grid; grid-template-columns: 1fr 1fr; gap: 50px; }
        
        /* FORM STİLLERİ */
        .form-box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .form-box h2 { font-family: 'Montserrat'; margin-bottom: 25px; color: var(--blue); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; }
        
        .send-btn { width: 100%; background: var(--blue); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .send-btn:hover { background: var(--dark); transform: translateY(-2px); }

        .contact-info h1 { font-family: 'Montserrat'; font-size: 2.5rem; color: var(--dark); }
        .info-item { margin-top: 30px; padding-left: 15px; border-left: 4px solid var(--neon); }
        
        @media (max-width: 768px) { .contact-container { grid-template-columns: 1fr; } .nav-menu { display: none; } }
    </style>
</head>
<body>

    <header>
        <a href="../index.html" class="logo">RULMAN SATIŞ</a>
        <nav><ul class="nav-menu">
            <li><a href="../index.html">Anasayfa</a></li>
            <li><a href="urunler.html">Ürünler</a></li>
            <li><a href="blog.html">Blog</a></li>
            <li><a href="iletisim.html" style="color:var(--blue)">İletişim</a></li>
        </ul></nav>
    </header>

    <main class="contact-container">
        <div class="contact-info">
            <h1>Hızlı Teklif & Teknik Destek</h1>
            <p>Projeleriniz için ihtiyacınız olan rulman detaylarını iletin, mühendislik ekibimiz en kısa sürede dönüş yapsın.</p>
            
            <div class="info-item">
                <strong>E-Posta:</strong><br>info@rulmansatis.com
            </div>
            <div class="info-item">
                <strong>Telefon / WhatsApp:</strong><br>0505 091 34 63
            </div>
        </div>

        <div class="form-box">
            <h2>İletişim Formu</h2>
            <form action="https://formspree.io/f/info@rulmansatis.com" method="POST">
                <div class="form-group">
                    <label>Adınız Soyadınız</label>
                    <input type="text" name="name" required placeholder="Örn: Mehmet Yusuf">
                </div>
                <div class="form-group">
                    <label>E-Posta Adresiniz</label>
                    <input type="email" name="email" required placeholder="yusuf@email.com">
                </div>
                <div class="form-group">
                    <label>Konu</label>
                    <input type="text" name="subject" placeholder="Teklif Talebi / Teknik Soru">
                </div>
                <div class="form-group">
                    <label>Mesajınız</label>
                    <textarea name="message" rows="5" required placeholder="İhtiyacınız olan rulman ölçülerini veya adet bilgisini buraya yazın..."></textarea>
                </div>
                <button type="submit" class="send-btn">MESAJI GÖNDER</button>
            </form>
        </div>
    </main>

</body>
</html>
