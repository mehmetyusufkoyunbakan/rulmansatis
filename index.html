    <style>
        /* TEMEL AYARLAR */
        :root {
            --blue: #004a99;
            --dark: #0f172a;
            --neon: #39FF14;
            --light: #f8fafc;
        }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: #fff; overflow-x: hidden; }

        /* ÜST BİLGİ BARI (Siyah Bar) */
        .top-bar {
            background: var(--dark);
            color: white;
            padding: 12px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            position: relative;
            z-index: 1001;
        }
        .top-bar a { color: var(--neon); text-decoration: none; font-weight: bold; }

        /* NAVİGASYON (Beyaz Bar) */
        header {
            background: white;
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo { font-family: 'Montserrat'; font-weight: 900; font-size: 1.6rem; color: var(--blue); text-decoration: none; }
        .nav-menu { display: flex; list-style: none; gap: 25px; margin: 0; padding: 0; }
        .nav-menu a { text-decoration: none; color: var(--dark); font-weight: 600; text-transform: uppercase; font-size: 0.85rem; transition: 0.3s; }
        .nav-menu a:hover { color: var(--blue); }

        /* HERO ALANI */
        .hero {
            height: 70vh;
            background: linear-gradient(rgba(15,23,42,0.6), rgba(15,23,42,0.6)), url('1000500012.jpg') center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            padding: 0 5%;
        }
        .hero h1 { font-family: 'Montserrat'; font-size: clamp(2.5rem, 6vw, 4.5rem); margin: 0; line-height: 1.1; }
        .hero p { font-size: 1.2rem; margin: 20px 0 30px; max-width: 700px; opacity: 0.9; }
        .hero-btns { display: flex; gap: 15px; }
        .btn { padding: 15px 35px; border-radius: 50px; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .btn-primary { background: var(--blue); color: white; }
        .btn-secondary { background: var(--neon); color: var(--dark); }

        /* KARTLAR (Grid) */
        .grid-section { padding: 80px 5%; max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
        .card { border-radius: 20px; overflow: hidden; position: relative; height: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); cursor: pointer; }
        .card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .card:hover img { transform: scale(1.1); }
        .card-overlay { position: absolute; bottom: 0; width: 100%; padding: 30px; background: linear-gradient(transparent, rgba(15,23,42,0.95)); color: white; box-sizing: border-box; }

        /* SABİT İLETİŞİM BUTONLARI (Sağ Alt) */
        .sticky-contacts { position: fixed; bottom: 30px; right: 25px; display: flex; flex-direction: column; gap: 15px; z-index: 2000; }
        .sticky-btn { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(0,0,0,0.3); transition: 0.3s; text-decoration: none; }
        .sticky-btn:hover { transform: scale(1.1); }
        .wa-btn { background: #25d366; }
        .call-btn { background: var(--blue); }
        .sticky-btn img { width: 30px; filter: brightness(0) invert(1); }

        @media (max-width: 768px) {
            .nav-menu { display: none; } /* Mobil için burger menü gerekebilir, şimdilik temizlik için gizli */
            .top-bar { flex-direction: column; text-align: center; gap: 5px; }
        }
    </style>
</head>
